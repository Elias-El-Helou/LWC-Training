<template>
    <lightning-card title="Accounts" icon-name="standard:account">
        <lightning-input label="Number Of Accounts to Display" value={maxRecords} onchange={handleChange}></lightning-input>
        <template for:each={accounts} for:item="acc">
            <div key={acc.Id}>
           {acc.Name}
            </div>
      </template>
      
    </lightning-card>
    
</template>
